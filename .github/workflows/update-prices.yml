# ===============================================
# 秒估車 - 每月自動更新價格工作流程 v4.0
# ===============================================
# 執行時間：每月1日凌晨 2:00 (台灣時間)
# 功能：自動更新車輛價格（市場折舊率 + Google Sheets）
# 特色：穩定可靠、不依賴爬蟲、支援手動觸發
# ===============================================

name: 每月自動更新車輛價格

on:
  # 每月1日凌晨2點執行（台灣時間 = UTC+8）
  schedule:
    - cron: '0 18 1 * *'  # UTC 18:00 = 台灣時間隔日 02:00

  # 推送時觸發測試
  push:
    branches:
      - main
    paths:
      - '.github/workflows/update-prices.yml'
      - 'scripts/price-updater.js'

  # 手動觸發（用於測試）
  workflow_dispatch:
    inputs:
      debug_mode:
        description: '啟用調試模式'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

# 設定權限
permissions:
  contents: write

jobs:
  update-car-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # 最長執行10分鐘（不需要爬蟲，執行很快）

    steps:
      # 1. 檢出代碼
      - name: 檢出代碼
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      # 2. 設定 Node.js 環境
      - name: 設定 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. 執行價格更新（不需要 npm install，使用原生模組）
      - name: 執行價格更新
        run: |
          cd scripts
          echo "🚀 開始執行價格更新..."
          node price-updater.js
        env:
          NODE_ENV: production
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
          DEBUG_MODE: ${{ github.event.inputs.debug_mode }}

      # 4. 檢查是否有變更
      - name: 檢查檔案變更
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain car-data.js) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "✅ 檢測到 car-data.js 有變更"
            git diff --stat car-data.js | head -20
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ car-data.js 無變更"
          fi

      # 5. 上傳執行日誌
      - name: 上傳執行日誌
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: update-logs-${{ github.run_number }}
          path: |
            scripts/update.log
            scripts/price-results.json
          retention-days: 30

      # 6. 提交變更
      - name: 提交價格更新
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add car-data.js
          git add scripts/price-results.json || true

          # 取得台灣時間
          TW_DATE=$(TZ='Asia/Taipei' date +'%Y年%m月%d日')
          TW_TIME=$(TZ='Asia/Taipei' date +'%H:%M')

          COMMIT_MSG="🔄 自動更新車價 - ${TW_DATE} ${TW_TIME}

          📊 更新方式：市場折舊率計算
          🤖 由 GitHub Actions 自動執行
          🔗 執行編號: #${{ github.run_number }}"

          git commit -m "$COMMIT_MSG"
          git push
          echo "✅ 變更已提交並推送"

      # 7. 執行結果摘要
      - name: 執行結果摘要
        if: always()
        run: |
          echo "=========================================="
          echo "📊 執行結果摘要"
          echo "=========================================="
          echo "執行時間: $(TZ='Asia/Taipei' date +'%Y-%m-%d %H:%M:%S') (台灣時間)"
          echo "觸發方式: ${{ github.event_name }}"
          echo "有變更: ${{ steps.check_changes.outputs.changes }}"
          echo "執行編號: #${{ github.run_number }}"
          echo "=========================================="

          # 顯示價格結果摘要
          if [ -f scripts/price-results.json ]; then
            echo ""
            echo "📈 價格更新統計："
            cat scripts/price-results.json | head -30
          fi

      # 8. 失敗通知
      - name: 失敗通知
        if: failure()
        run: |
          echo "❌ 價格更新失敗！"
          echo "請檢查執行日誌"
          echo ""
          echo "可能原因："
          echo "1. car-data.js 格式錯誤"
          echo "2. Google Sheets URL 無效"
          echo "3. 權限問題"
